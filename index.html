---
layout: default
---

<div class="slanted-div">
<div class="container">

  <div>

    <div>
      <h3>Hope anything here helps you out.</h3>
      <i>- Eric</i>
    </div>

    <div>
      <div class="the-reader"></div>
    </div>

  </div>
</div>
</div>

<div class="container">
  {% for post in site.posts %}

  <div>
    <article class="post excerpt">

      <h1><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h1>
      <p>{{ post.date | date: "%B %e, %Y" }}</p>

      <div class="entry">
        {{ post.excerpt }}
      </div>

      <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">Read More</a>
    </article>
  </div>
  {% endfor %}
</div>
