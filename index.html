---
layout: default
---

<section class="section container is-max-desktop">
  {% for post in site.posts %}
  <div class="mb-5">
    <header class="post-header">

      <a class="has-text-grey-dark" href="{{ site.baseurl }}{{ post.url }}">
        <h1 class="is-size-3 has-text-weight-bold">{{ post.title }}</h1>
      </a>

      <div class="has-text-grey-light is-size-6">

        <div class="mt-3 mb-4">
          {% for tag in post.tags %}
          <a class="post-category" href="{{ site.baseurl }}/tag/{{tag}}/">{{tag}}</a>
          {% endfor %}
          <p class="mt-3">{{ post.date | date: "%B %e, %Y" }} By<a class="post-author" href="#"> Eric Miguel</a></p>

        </div>

    </header>

    <div class="post-description mb-2">
      {{ post.excerpt }}
    </div>

    <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">Read More</a>
  </div>
  <hr class="mt-4 mb-4">
  {% endfor %}
</section>
